  { key: () => NWEEK_KEY,   tab: 'nextweek',  label: 'Next Week', color:'#fb923c', border:'rgba(251,146,60,0.35)',  bg:'rgba(251,146,60,0.1)'  },
  { key: () => SOMEDAY_KEY, tab: 'someday',   label: 'Someday',   color:'#a78bfa', border:'rgba(167,139,250,0.35)', bg:'rgba(167,139,250,0.1)' },
];

function openSearch() {
  _searchPrevMode = viewMode;
  searchOpen = true;
  document.getElementById('search-btn').classList.add('active');
  document.getElementById('search-bar').classList.add('visible');
  document.getElementById('task-list').style.display = '';
  document.getElementById('wmem-area').style.display = 'none';
  document.getElementById('footer').style.display = 'none';
  document.getElementById('yest-banner').classList.remove('visible');
  document.getElementById('now-banner').style.display = 'none';
  renderSearchResults([]);
  setTimeout(() => document.getElementById('search-input').focus(), 0);
}

function closeSearch() {
  searchOpen = false;
  document.getElementById('search-btn').classList.remove('active');
  document.getElementById('search-bar').classList.remove('visible');
  document.getElementById('search-input').value = '';
  if (_searchPrevMode === 'history') switchTab('history', histDate);
  else switchTab(_searchPrevMode);
}

function runSearch(query) {
  const q = query.trim().toLowerCase();
  if (!q) return [];
  const results = [];
  SEARCH_TABS.forEach(({ key, tab, label, color, border, bg }) => {
    loadKey(key()).forEach(task => {
      const textMatch  = task.text.toLowerCase().includes(q);
      const notesMatch = (task.notes || []).some(n => n.text.toLowerCase().includes(q));
      if (textMatch || notesMatch)
        results.push({ task, key: key(), tab, label, color, border, bg, textMatch, notesMatch });
    });
  });
  return results;
}

function _hlMatch(text, q) {
  if (!q) return esc(text);
  const idx = text.toLowerCase().indexOf(q);
  if (idx === -1) return esc(text);
  return esc(text.slice(0, idx)) + '<mark>' + esc(text.slice(idx, idx + q.length)) + '</mark>' + esc(text.slice(idx + q.length));
}

function renderSearchResults(results) {
  const list = document.getElementById('task-list');
  list.innerHTML = '';
  const q = (document.getElementById('search-input').value || '').trim().toLowerCase();
  if (!q) { list.innerHTML = '<div class="search-empty">Type to search across all lists</div>'; return; }
  if (!results.length) { list.innerHTML = '<div class="search-empty">No results for "' + esc(q) + '"</div>'; return; }

  results.forEach(({ task, key, tab, label, color, border, bg, textMatch, notesMatch }) => {
    const row = document.createElement('div');
    row.className = 'search-result-row';
    row.dataset.id = task.id;
    const matchNote = (!textMatch && notesMatch)
      ? (task.notes || []).find(n => n.text.toLowerCase().includes(q)) : null;
    row.innerHTML = `
      <div class="drag-handle">⠿</div>
      <div class="result-text">${_hlMatch(task.text, q)}${task.done ? ' <span style="opacity:0.4;font-weight:400;font-size:11px;">(done)</span>' : ''}</div>
      ${matchNote ? `<div class="result-note-snippet">· ${_hlMatch(matchNote.text, q)}</div>` : ''}
      <span class="result-tab-badge" style="color:${color};border-color:${border};background:${bg}">${label}</span>
    `;
    row.addEventListener('click', e => {
      if (e.target.closest('.drag-handle')) return;
      closeSearch();
      if (tab === 'yesterday') switchTab('yesterday');
      else switchTab(tab);
    });
    const handle = row.querySelector('.drag-handle');
    let handleDown = false;
    handle.addEventListener('mousedown', () => { handleDown = true; });
    document.addEventListener('mouseup', () => { handleDown = false; }, { once: true });
    row.setAttribute('draggable', 'true');
    row.addEventListener('dragstart', e => {
      if (!handleDown) { e.preventDefault(); return; }
      crossDrag = { tasks: [task], fromTab: tab, fromKey: key };
      handle.style.cursor = 'grabbing';
      setTimeout(() => row.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
      highlightDestTabs(tab);
    });
    row.addEventListener('dragend', () => {
      handle.style.cursor = ''; row.classList.remove('dragging');
      crossDrag = null; clearTabHighlights();
      document.getElementById('task-list').classList.remove('drop-zone');
    });
    list.appendChild(row);
  });
}

// ── Render helpers ─────────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function appendDivider(list) {
  const d = document.createElement('div'); d.className = 'done-divider'; d.textContent = 'Completed';
  list.appendChild(d);
}

// ── Render: today ──────────────────────────────────────────────
function render() {
  buildDupIndex();
  const list    = document.getElementById('task-list');
  const pending = tasks.filter(t => !t.done);
  const done    = tasks.filter(t =>  t.done);
  const focused = tasks.find(t => t.focus);

  document.getElementById('done-count').textContent  = done.length;
  document.getElementById('total-count').textContent = tasks.length;
  const banner = document.getElementById('now-banner');
  if (focused) { document.getElementById('now-task-name').textContent = focused.text; banner.classList.add('visible'); }
  else { banner.classList.remove('visible'); }
  document.getElementById('clear-row').classList.toggle('visible', done.length > 0);
  document.getElementById('push-row').classList.toggle('visible', pending.some(t => t.timeMins != null));

  list.innerHTML = '';
  if (!tasks.length) { list.innerHTML = '<div class="empty">Nothing yet — add a task below</div>'; return; }

  const priorityUntimed = pending.filter(t => t.priority && !t.time);
  const timed           = pending.filter(t => t.time).sort((a,b) => (a.timeMins ?? parseTime(a.time)) - (b.timeMins ?? parseTime(b.time)));
  const untimed         = pending.filter(t => !t.priority && !t.time);
  [...priorityUntimed, ...timed, ...untimed].forEach(t => list.appendChild(makeRow(t, 'today', TODAY_KEY)));
  if (done.length) { appendDivider(list); done.forEach(t => list.appendChild(makeRow(t, 'today', TODAY_KEY))); }

  initWithinDrag(pending, TODAY_KEY);
  requestAnimationFrame(() => fitText(tasks));
}

// ── Render: read-only (yesterday / history) ────────────────────
function renderView(taskList, tab) {
  buildDupIndex();
  const list    = document.getElementById('task-list');
  const pending = taskList.filter(t => !t.done);
  const done    = taskList.filter(t =>  t.done);
  const key     = tabKey(tab);

  document.getElementById('done-count').textContent  = done.length;
  document.getElementById('total-count').textContent = taskList.length;

  list.innerHTML = '';
  if (!taskList.length) { list.innerHTML = '<div class="empty">No tasks found for this day</div>'; return; }

  const timed   = pending.filter(t =>  t.time).sort((a,b) => (a.timeMins ?? parseTime(a.time)) - (b.timeMins ?? parseTime(b.time)));
  const untimed = pending.filter(t => !t.time);
  [...timed, ...untimed].forEach(t => list.appendChild(makeRow(t, tab, key)));
  if (done.length) { appendDivider(list); done.forEach(t => list.appendChild(makeRow(t, tab, key))); }

  initCrossDragSource(pending, tab, key);
  requestAnimationFrame(() => fitText(taskList));
}

// ── Render: tomorrow / someday ─────────────────────────────────
function renderList(key, tab) {
  buildDupIndex();
  const list      = document.getElementById('task-list');
  const listTasks = loadKey(key);
  const pending   = listTasks.filter(t => !t.done);
  const done      = listTasks.filter(t =>  t.done);

  document.getElementById('done-count').textContent  = done.length;
  document.getElementById('total-count').textContent = listTasks.length;
  document.getElementById('clear-row').classList.toggle('visible', done.length > 0);

  list.innerHTML = '';
  if (!listTasks.length) { list.innerHTML = '<div class="empty">Nothing here — add a task below</div>'; requestAnimationFrame(() => fitText([])); return; }

  pending.forEach(t => list.appendChild(makeRow(t, tab, key)));
  if (done.length) { appendDivider(list); done.forEach(t => list.appendChild(makeRow(t, tab, key))); }

  initWithinDrag(pending, key);
  requestAnimationFrame(() => fitText(listTasks));
}

// ── Render: someday (categorized) ─────────────────────────────
function renderSomeday() {
  buildDupIndex();
  const list = document.getElementById('task-list');
  let allTasks = loadKey(SOMEDAY_KEY);

  // Auto-assign missing categories, save back if any changed
  let changed = false;
  allTasks = allTasks.map(t => {
    if (!t.category) { changed = true; return { ...t, category: detectCategory(t.text) }; }
    return t;
  });
  if (changed) saveKey(SOMEDAY_KEY, allTasks);

  const pending = allTasks.filter(t => !t.done);
  const done    = allTasks.filter(t =>  t.done);

  document.getElementById('done-count').textContent  = done.length;
  document.getElementById('total-count').textContent = allTasks.length;
  document.getElementById('clear-row').classList.toggle('visible', done.length > 0);

  list.innerHTML = '';
  if (!allTasks.length) {
    list.innerHTML = '<div class="empty">Nothing here yet — add a task below</div>';
    return;
  }

  // Group pending by category, sorted alphabetically
  const groups = {};
  pending.forEach(t => { const c = t.category || 'Other'; (groups[c] = groups[c] || []).push(t); });
  Object.keys(groups).sort().forEach(cat => {
    const hdr = document.createElement('div');
    hdr.className = 'someday-cat-header';
    hdr.textContent = cat;
    list.appendChild(hdr);
    groups[cat].forEach(t => {
      const row = makeRow(t, 'someday', SOMEDAY_KEY);
      row.classList.add('someday-row');
      row.dataset.category = cat;
      list.appendChild(row);
    });
  });

  if (done.length) {
    appendDivider(list);
    done.forEach(t => {
      const row = makeRow(t, 'someday', SOMEDAY_KEY);
      row.classList.add('someday-row');
      list.appendChild(row);
    });
  }

  initWithinDrag(pending, SOMEDAY_KEY);
}

// ── Make row ───────────────────────────────────────────────────
function makeRow(task, tab, key) {
  const readOnly  = tab === 'yesterday' || tab === 'history';
  const isToday   = tab === 'today';
  const noCheck   = tab === 'week' || tab === 'nextweek';
  const hasNotes = task.notes && task.notes.length > 0;
  const isOpen   = task.expanded && !task.done;

  const hideHandle = false;

  const row = document.createElement('div');
  row.className = 'task-row' + (task.done ? ' done' : '') + (task.focus ? ' focused' : '') + (task.priority && !task.done ? ' priority' : '') + (isOpen ? ' notes-open' : '');
  row.dataset.id = task.id;

  const main = document.createElement('div');
  main.className = 'task-main';
  main.innerHTML = `
    <div class="drag-handle" style="${hideHandle ? 'visibility:hidden' : ''}">⠿</div>
    ${isToday && !task.done ? `<div class="task-priority-star" title="Priority">★</div>` : ''}
    ${!noCheck ? `<div class="task-check" style="${readOnly ? 'pointer-events:none;opacity:0.5' : ''}"><span class="check-mark">✓</span></div>` : ''}
    <div class="task-body">
      <div class="task-text">${esc(task.text)}</div>
      ${!task.done && _dupTexts.has(task.text) ? `<span class="dup-badge" title="Similar task exists elsewhere">D</span>` : ''}
      ${task.time
        ? `<div class="task-time" style="${readOnly ? 'pointer-events:none' : ''}">${esc(task.time)}</div>`
        : (!task.done && !readOnly ? `<div class="task-time-add">+ time</div>` : '')
      }
    </div>
    ${!readOnly ? `<div class="task-actions">
      ${!task.done ? `<div class="action-btn notes-btn ${hasNotes ? 'has-notes' : ''}" title="Notes">N</div>` : ''}
      ${isToday && !task.done ? `<div class="action-btn focus-btn" title="Focus">F</div>` : ''}
      <div class="action-btn del-btn" title="Delete">✕</div>
    </div>` : ''}
  `;
  row.appendChild(main);

  // Notes section
  if (!task.done) {
    const ns = document.createElement('div');
    ns.className = 'task-notes-section';
    (task.notes || []).forEach(n => {
      const item = document.createElement('div');
      item.className = 'task-note-item';
      item.innerHTML = `
        <div class="note-check ${n.done ? 'done' : ''}"><span class="note-check-mark">✓</span></div>
        <span class="note-text ${n.done ? 'done' : ''}">${esc(n.text)}</span>
        ${!readOnly ? `<span class="note-del">✕</span>` : ''}`;
      if (!readOnly) {
        item.querySelector('.note-check').addEventListener('click', e => { e.stopPropagation(); toggleNoteIn(task.id, n.id, key); });
        const textEl = item.querySelector('.note-text');
        textEl.addEventListener('dblclick', e => { e.stopPropagation(); if (!n.done) editNoteIn(task.id, n.id, key, textEl); });
        item.querySelector('.note-del').addEventListener('click', e => { e.stopPropagation(); deleteNoteIn(task.id, n.id, key); });
      }
      ns.appendChild(item);
    });
    if (!readOnly) {
      const ar = document.createElement('div');
      ar.className = 'note-add-row';
      ar.innerHTML = `<div class="note-add-placeholder"></div><input class="note-input" placeholder="Add a note…" autocomplete="off" />`;
      const inp = ar.querySelector('.note-input');
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter' && inp.value.trim()) { e.preventDefault(); addNoteIn(task.id, inp.value, key); }
        if (e.key === 'Escape') inp.blur();
      });
      ns.appendChild(ar);
    }
    row.appendChild(ns);
  }

  // Listeners
  if (!readOnly) {
    if (!noCheck) main.querySelector('.task-check').addEventListener('click', e => { e.stopPropagation(); toggleDoneIn(task.id, key); });
    const nb = main.querySelector('.notes-btn');
    if (nb) nb.addEventListener('click', e => { e.stopPropagation(); toggleExpandedIn(task.id, key); });
    const fb = main.querySelector('.focus-btn');
    if (fb) fb.addEventListener('click', e => { e.stopPropagation(); toggleFocusIn(task.id, key); });
    const pb = main.querySelector('.task-priority-star');
    if (pb) pb.addEventListener('click', e => { e.stopPropagation(); togglePriorityIn(task.id, key); });
    main.querySelector('.del-btn').addEventListener('click', e => { e.stopPropagation(); deleteTaskFrom(task.id, key); });
  }
  if (readOnly) {
    row.style.cursor = 'pointer';
    // Click row → toggle selection
    row.addEventListener('click', e => {
      if (e.target.closest('.drag-handle')) return;
      row.classList.toggle('selected');
      if (row.classList.contains('selected')) selectedIds.add(task.id);
      else selectedIds.delete(task.id);
    });
    // Click notes-star → expand notes
    const star = main.querySelector('.notes-btn');
    if (star) star.addEventListener('click', e => { e.stopPropagation(); row.classList.toggle('notes-open'); });
  }

  // Edit text
  main.querySelector('.task-text').addEventListener('dblclick', () => {
    if (task.done || readOnly) return;
    const textEl = main.querySelector('.task-text');
    const inp = document.createElement('input');
    inp.className = 'task-text-input'; inp.value = task.text;
    textEl.replaceWith(inp); inp.focus(); inp.select();
    function commit() { updateTaskIn(task.id, inp.value.trim() || task.text, task.time, key); reRender(); }
    inp.addEventListener('blur', commit);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); commit(); } if (e.key === 'Escape') reRender(); });
  });

  // Edit time
  if (!readOnly) {
    function openTimeEdit(el) {
      if (task.done) return;
      const inp = document.createElement('input');
      inp.className = 'task-time-input'; inp.value = task.time || ''; inp.placeholder = '6pm';
      el.replaceWith(inp); inp.focus(); inp.select();
      function commit() { updateTaskIn(task.id, task.text, inp.value.trim(), key); reRender(); }
      inp.addEventListener('blur', commit);
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); commit(); } if (e.key === 'Escape') reRender(); });
    }
    const te = main.querySelector('.task-time'), ta = main.querySelector('.task-time-add');
    if (te) te.addEventListener('click', e => { e.stopPropagation(); openTimeEdit(te); });
    if (ta) ta.addEventListener('click', e => { e.stopPropagation(); openTimeEdit(ta); });
  }

  return row;
}

// ── Selection (read-only tabs) ─────────────────────────────────
let selectedIds = new Set();

function clearSelection() {
  selectedIds.clear();
  document.querySelectorAll('.task-row.selected').forEach(r => r.classList.remove('selected'));
}

// ── Drag state ─────────────────────────────────────────────────
let dragId    = null;
let crossDrag = null; // { tasks: [...], fromTab, fromKey }

function highlightDestTabs(fromTab) {
  ['today','tomorrow','week','nextweek','someday'].filter(t => t !== fromTab).forEach(t => {
    document.getElementById(TAB_MAP[t]).classList.add('drop-target');
  });
}
function clearTabHighlights() {
  Object.values(TAB_MAP).forEach(id => document.getElementById(id).classList.remove('drop-target'));
}

// ── Within-list drag (today / tomorrow / someday) ──────────────
function initWithinDrag(pending, key) {
  const rows      = document.querySelectorAll('.task-row:not(.done)');
  const pendingIds = new Set(pending.map(t => t.id));
  let handleDown  = false;

  rows.forEach(row => {
    if (!pendingIds.has(row.dataset.id)) return;
    const task   = pending.find(t => t.id === row.dataset.id);
    const handle = row.querySelector('.drag-handle');
    if (!handle) return;

    handle.addEventListener('mousedown', () => { handleDown = true; });
    document.addEventListener('mouseup', () => { handleDown = false; }, { once: true });
    row.setAttribute('draggable', 'true');

    row.addEventListener('dragstart', e => {
      if (!handleDown) { e.preventDefault(); return; }
      dragId    = row.dataset.id;
      crossDrag = { tasks: [task], fromTab: viewMode, fromKey: key };
      handle.style.cursor = 'grabbing';
      setTimeout(() => row.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
      highlightDestTabs(viewMode);
    });

    row.addEventListener('dragend', () => {
      handle.style.cursor = '';
      rows.forEach(r => r.classList.remove('dragging','drag-over-top','drag-over-bottom','note-drop-target'));
      dragId = null; crossDrag = null;
      clearTabHighlights();
      document.getElementById('task-list').classList.remove('drop-zone');
    });

    row.addEventListener('dragover', e => {
      if (!dragId || dragId === row.dataset.id) return;
      if (crossDrag?.fromTab !== viewMode) return;
      e.preventDefault(); e.stopPropagation();
      rows.forEach(r => r.classList.remove('drag-over-top','drag-over-bottom','note-drop-target'));
      const rect = row.getBoundingClientRect();
      const pct  = (e.clientY - rect.top) / rect.height;
      if (pct < 0.25)      row.classList.add('drag-over-top');
      else if (pct > 0.75) row.classList.add('drag-over-bottom');
      else                  row.classList.add('note-drop-target');
    });
    row.addEventListener('dragleave', () => row.classList.remove('drag-over-top','drag-over-bottom','note-drop-target'));
    row.addEventListener('drop', e => {
      if (!dragId || dragId === row.dataset.id || !crossDrag || crossDrag.fromTab !== viewMode) return;
      e.preventDefault(); e.stopPropagation();
      const rect = row.getBoundingClientRect();
      const pct  = (e.clientY - rect.top) / rect.height;
      // Middle zone → become a note on the target task
      if (pct >= 0.25 && pct <= 0.75) {
        const arr = getArr(key);
        const src = arr.find(t => t.id === dragId);
        const dst = arr.find(t => t.id === row.dataset.id);
        if (src && dst) {
          if (!dst.notes) dst.notes = [];
          dst.notes.push({ id: uid(), text: src.text });
          dst.expanded = true;
          const remaining = arr.filter(t => t.id !== dragId);
          putArr(key, remaining);
          if (key === TODAY_KEY) tasks = remaining;
          reRender();
        }
        return;
      }
      // In Someday: if dropping into a different category, reassign category
      if (key === SOMEDAY_KEY && row.dataset.category) {
        const arr = getArr(SOMEDAY_KEY);
        const t = arr.find(t => t.id === dragId);
        if (t && t.category !== row.dataset.category) {
          t.category = row.dataset.category;
          putArr(SOMEDAY_KEY, arr);
          reRender(); return;
        }
      }
      const after = pct >= 0.5;
      reorderInKey(dragId, row.dataset.id, after, key);
    });
  });
}

function reorderInKey(srcId, dstId, after, key) {
  const arr = key === TODAY_KEY ? tasks : loadKey(key);
  const si = arr.findIndex(t => t.id === srcId);
  let   di = arr.findIndex(t => t.id === dstId);
  if (si === -1 || di === -1) return;
  const [moved] = arr.splice(si, 1);
  di = arr.findIndex(t => t.id === dstId);
  arr.splice(after ? di+1 : di, 0, moved);
  if (key === TODAY_KEY) { save(); render(); } else { saveKey(key, arr); renderList(key, viewMode); }
}

// ── Cross-tab drag source (read-only tabs) ─────────────────────
function initCrossDragSource(pending, tab, key) {
  const rows = document.querySelectorAll('.task-row:not(.done)');
  let handleDown = false;

  rows.forEach(row => {
    const task = pending.find(t => t.id === row.dataset.id);
    if (!task) return;
    const handle = row.querySelector('.drag-handle');
    if (!handle) return;

    handle.addEventListener('mousedown', () => { handleDown = true; });
    document.addEventListener('mouseup', () => { handleDown = false; }, { once: true });
    row.setAttribute('draggable', 'true');

    row.addEventListener('dragstart', e => {
      if (!handleDown) { e.preventDefault(); return; }
      const dragTasks = selectedIds.size > 0 && selectedIds.has(task.id)
        ? pending.filter(t => selectedIds.has(t.id))
        : [task];
      crossDrag = { tasks: dragTasks, fromTab: tab, fromKey: key };
      handle.style.cursor = 'grabbing';
      setTimeout(() => row.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
      highlightDestTabs(tab);
    });

    row.addEventListener('dragend', () => {
      handle.style.cursor = ''; row.classList.remove('dragging');
      crossDrag = null; clearTabHighlights();
      document.getElementById('task-list').classList.remove('drop-zone');
    });
  });
}

// ── Cross-tab drop targets (set up once on boot) ───────────────
let _tabHoverTimer = null;

function initCrossTabDrop() {
  const taskList = document.getElementById('task-list');

  ['today','tomorrow','week','nextweek','someday'].forEach(tab => {
    const el = document.getElementById(TAB_MAP[tab]);

    el.addEventListener('dragenter', e => {
      if (!crossDrag || crossDrag.fromTab === tab) return;
      e.preventDefault();
      // Deliberate 600ms hover to switch — prevents accidental switches during within-list drags
      clearTimeout(_tabHoverTimer);
      _tabHoverTimer = setTimeout(() => switchTab(tab), 600);
    });
    el.addEventListener('dragleave', () => clearTimeout(_tabHoverTimer));
    el.addEventListener('dragover', e => {
      if (!crossDrag || crossDrag.fromTab === tab) return;
      e.preventDefault();
    });
    // Drop directly on tab button — instant, no timer needed
    el.addEventListener('drop', e => {
      if (!crossDrag || crossDrag.fromTab === tab) return;
      e.preventDefault();
      clearTimeout(_tabHoverTimer);
      landCrossDrag(tab);
    });
  });

  taskList.addEventListener('dragover', e => {
    if (!crossDrag || crossDrag.fromTab === viewMode) return;
    e.preventDefault(); taskList.classList.add('drop-zone');
  });
  taskList.addEventListener('dragleave', e => {
    if (!taskList.contains(e.relatedTarget)) taskList.classList.remove('drop-zone');
  });
  taskList.addEventListener('drop', e => {
    if (!crossDrag || crossDrag.fromTab === viewMode) return;
    e.preventDefault(); taskList.classList.remove('drop-zone');
    landCrossDrag();
  });
}

function landCrossDrag(forceDestTab) {
  if (!crossDrag) return;
  const { tasks: dragTasks, fromKey } = crossDrag;
  const destTab = forceDestTab || viewMode;
  const destKey = tabKey(destTab);
  if (!destKey) return;

  // Add all to destination
  const destArr = getArr(destKey);
  dragTasks.forEach((task, i) => {
    const t = { ...task, id: uid(), time:'', timeMins: null, done:false, focus:false, expanded:false };
    if (destKey === SOMEDAY_KEY) t.category = t.category || detectCategory(t.text);
    destArr.push(t);
  });
  putArr(destKey, destArr);

  // Remove all from source
  const dragIds = new Set(dragTasks.map(t => t.id));
  putArr(fromKey, getArr(fromKey).filter(t => !dragIds.has(t.id)));

  clearSelection();
  crossDrag = null; dragId = null;
  clearTabHighlights();
  reRender();
}

// ── Habits ─────────────────────────────────────────────────────
const HABIT_DEFS = [
  { label: 'Walk',       type: 'pills', items: ['walk 2K','walk 4K','walk 6K','walk 8K','walk 10K','walk 12K','walk 14K'] },
  { label: 'Food',       type: 'pills', items: ['breakfast','lunch','dinner'] },
  { label: 'Daily',      type: 'pills', items: ['journal','AI project'] },
  { label: 'Network',    type: 'count', unit: 'people' },
  { label: 'Apply jobs', type: 'count', unit: 'jobs' },
];
let _habitOpen = false;
let _habitCounts = { 'Network': 1, 'Apply jobs': 1 };

function toggleHabits() {
  _habitOpen = !_habitOpen;
  document.getElementById('habit-toggle-btn').textContent = _habitOpen ? 'Habits ▾' : 'Habits ▸';
  document.getElementById('habit-strip').classList.toggle('visible', _habitOpen);
  if (_habitOpen) renderHabitStrip();
}

function renderHabitStrip() {
  const strip = document.getElementById('habit-strip');
  strip.innerHTML = '';
  const inToday = new Set(tasks.map(t => t.text.toLowerCase()));

  HABIT_DEFS.forEach(def => {
    const row = document.createElement('div');
    row.className = 'habit-row';

    const lbl = document.createElement('span');
    lbl.className = 'habit-row-label';
    lbl.textContent = def.label;
    row.appendChild(lbl);

    if (def.type === 'pills') {
      def.items.forEach(text => {
        const shortLabel = def.label === 'Walk' ? text.replace('walk ', '') : text;
        const already = inToday.has(text.toLowerCase());
        const btn = document.createElement('button');
        btn.className = 'habit-pill' + (already ? ' added' : '');
        btn.textContent = shortLabel;
        btn.addEventListener('click', () => {
          if (already) return;
          addTaskTo(text, TODAY_KEY);
          renderHabitStrip();
        });
        row.appendChild(btn);
      });

    } else {
      const n = _habitCounts[def.label];
      const taskText = `${def.label.toLowerCase()} — ${n} ${n === 1 ? def.unit.replace(/s$/, '') : def.unit}`;

      const decBtn = document.createElement('button');
      decBtn.className = 'habit-count-btn';
      decBtn.textContent = '−';
      decBtn.addEventListener('click', () => { _habitCounts[def.label] = Math.max(1, n - 1); renderHabitStrip(); });

      const val = document.createElement('span');
      val.className = 'habit-count-val';
      val.textContent = n;

      const incBtn = document.createElement('button');
      incBtn.className = 'habit-count-btn';
      incBtn.textContent = '+';
      incBtn.addEventListener('click', () => { _habitCounts[def.label] = n + 1; renderHabitStrip(); });

      const addBtn = document.createElement('button');
      addBtn.className = 'habit-add-btn';
      addBtn.textContent = 'Add';
      addBtn.addEventListener('click', () => {
        const task = { id: uid(), text: taskText, time: '', timeMins: null, done: false, focus: false, priority: false, notes: [], expanded: false };
        tasks.push(task);
        // Re-label all entries for this habit with "part X of N"
        const prefix = def.label.toLowerCase();
        const isMatch = t => t.text.replace(/\s*\(part \d+ of \d+\)$/i, '').toLowerCase().startsWith(prefix);
        const matches = tasks.filter(isMatch);
        if (matches.length > 1) {
          matches.forEach((t, i) => {
            const base = t.text.replace(/\s*\(part \d+ of \d+\)$/i, '');
            t.text = `${base} (part ${i + 1} of ${matches.length})`;
          });
        }
        save();
        reRender();
        renderHabitStrip();
      });

      row.appendChild(decBtn);
      row.appendChild(val);
      row.appendChild(incBtn);
      row.appendChild(addBtn);
    }

    strip.appendChild(row);
  });
}

// ── Push times ─────────────────────────────────────────────────
function _minsToTimeStr(m) {
  const h = Math.floor(m / 60) % 24, min = m % 60;
  const period = h >= 12 ? 'pm' : 'am';
  const h12 = h % 12 || 12;
  return min === 0 ? `${h12}${period}` : `${h12}:${String(min).padStart(2,'0')}${period}`;
}

function pushTimes(hours) {
  const timed = tasks.filter(t => !t.done && t.timeMins != null);
  if (!timed.length) return;
  timed.forEach(t => {
    t.timeMins = t.timeMins + hours * 60;
    t.time = _minsToTimeStr(t.timeMins);
  });
  save();
  render();
}

// ── Yesterday rollover ─────────────────────────────────────────
function rolloverYesterday() {
  if (localStorage.getItem(YEST_ROLLED_KEY) === TODAY_DATE) return;
  const yestArr  = loadKey(YEST_KEY);
  const incomplete = yestArr.filter(t => !t.done);
  if (incomplete.length) {
    const todayArr   = loadKey(TODAY_KEY);
    const todayTexts = new Set(todayArr.map(t => t.text));
    incomplete.forEach((t) => {
      if (!todayTexts.has(t.text)) {
        todayArr.push({ ...t, id: uid(), done: false, focus: false, expanded: false, time: '', timeMins: null });
      }
    });
    saveKey(TODAY_KEY, todayArr);
    tasks = loadKey(TODAY_KEY);
    saveKey(YEST_KEY, yestArr.filter(t => t.done));
  }
  localStorage.setItem(YEST_ROLLED_KEY, TODAY_DATE);
}

// ── Tomorrow rollover ──────────────────────────────────────────
function rolloverTomorrow() {
  // Fire exactly once per calendar day — when the date changes overnight.
  // If it already ran today, leave Tomorrow alone.
  if (localStorage.getItem(TMRW_ROLLED_KEY) === TODAY_DATE) return;
  const pending = loadKey(TMRW_KEY).filter(t => !t.done);
  if (pending.length) {
    const todayArr = loadKey(TODAY_KEY);
    const todayTexts = new Set(todayArr.map(t => t.text));
    pending.forEach((t) => {
      if (!todayTexts.has(t.text)) {
        todayArr.push({ ...t, id: uid(), done: false, focus: false, expanded: false });
      }
    });
    saveKey(TODAY_KEY, todayArr);
    tasks = loadKey(TODAY_KEY);
    saveKey(TMRW_KEY, []);
  }
  localStorage.setItem(TMRW_ROLLED_KEY, TODAY_DATE);
}

// ── Migrate: backfill timeMins on old tasks ────────────────────
function parseTimeSimple(str) {
  // Old static heuristic — used only for migration, no clock dependency
  if (!str) return Infinity;
  const s = str.trim().toLowerCase();
  const noon = s.match(/^noon:?\s*(\d{1,2})?$/);
  if (noon) return 12 * 60 + (noon[1] ? parseInt(noon[1]) : 0);
  const ampm = s.match(/(am|pm)$/);
  const isPM = ampm ? ampm[1] === 'pm' : null;
  const p = s.match(/^(\d{1,2})(?::(\d{2}))?/);
  if (!p) return Infinity;
  let h = parseInt(p[1]);
  const min = p[2] ? parseInt(p[2]) : 0;
  if (isPM !== null) { if (isPM && h !== 12) h += 12; if (!isPM && h === 12) h = 0; }
  else { if (h >= 1 && h <= 6) h += 12; }
  return h * 60 + min;
}

function migrateTimeMins() {
  [TODAY_KEY, TMRW_KEY, SOMEDAY_KEY, YEST_KEY].forEach(key => {
    const arr = loadKey(key);
    let changed = false;
    arr.forEach(t => {
      if (t.time && t.timeMins == null) { t.timeMins = parseTimeSimple(t.time); changed = true; }
    });
    if (changed) { saveKey(key, arr); if (key === TODAY_KEY) tasks = arr; }
  });
}

// ── Migrate UTC keys → local keys (one time) ──────────────────
function migrateUTCKeys() {
  const utcToday = new Date().toISOString().slice(0, 10);
  const utcYest  = (() => { const d = new Date(); d.setDate(d.getDate()-1); return d.toISOString().slice(0,10); })();
  // If UTC date === local date, no migration needed
  if (utcToday === TODAY_DATE) return;
  // Move UTC today → local today
  [[`today-v1-${utcToday}`, TODAY_KEY], [`today-v1-${utcYest}`, YEST_KEY]].forEach(([utcKey, localKey]) => {
    if (utcKey === localKey) return;
    const utcData  = localStorage.getItem(utcKey);
    const localData = localStorage.getItem(localKey);
    if (!utcData) return;
    const utcArr   = JSON.parse(utcData);
    const localArr = localData ? JSON.parse(localData) : [];
    const localTexts = new Set(localArr.map(t => t.text));
    const merged = [...localArr, ...utcArr.filter(t => !localTexts.has(t.text))];
    localStorage.setItem(localKey, JSON.stringify(merged));
  });
}

// ── Move done tasks to the day they were actually completed ────
function cleanupMisplacedDone() {
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const todayMs = todayStart.getTime();
  const todayArr = loadKey(TODAY_KEY);
  const yestArr  = loadKey(YEST_KEY);
  // A task belongs in yesterday if: it's done, and either completedAt or id (creation ms) is before today
  const misplaced = todayArr.filter(t => {
    if (!t.done) return false;
    const ts = t.completedAt || parseInt(t.id);
    return ts < todayMs;
  });
  if (!misplaced.length) return;
  const yestTexts = new Set(yestArr.map(t => t.text));
  const newYest  = [...yestArr, ...misplaced.filter(t => !yestTexts.has(t.text))];
  const newToday = todayArr.filter(t => !misplaced.includes(t));
  saveKey(YEST_KEY, newYest);
  saveKey(TODAY_KEY, newToday);
  tasks = newToday;
}

// ── Repair: give any colliding ids within a list fresh unique ids ──
function dedupeIds() {
  const keys = [TODAY_KEY, YEST_KEY, TMRW_KEY, WEEK_KEY, NWEEK_KEY, SOMEDAY_KEY];
  // also any history day keys
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('today-v1-') && !keys.includes(k)) keys.push(k);
  }
  keys.forEach(key => {
    const arr = loadKey(key);
    if (!arr.length) return;
    const seen = new Set();
    let changed = false;
    arr.forEach(t => {
      if (seen.has(t.id)) { t.id = uid(); changed = true; }
      seen.add(t.id);
    });
    if (changed) { saveKey(key, arr); if (key === TODAY_KEY) tasks = arr; }
  });
}

migrateUTCKeys();
migrateTimeMins();
dedupeIds();
cleanupMisplacedDone();
