<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Today</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f; --surface: #16161a; --surface2: #1e1e24;
      --border: #2a2a35; --text: #e8e8f0; --muted: #6b6b80;
      --amber: #fbbf24; --green: #10b981; --blue: #60a5fa;
      --purple: #a78bfa; --cyan: #22d3ee; --orange: #fb923c;
      --row-h: 48px; --task-font: 16px; --time-font: 11px; --check-size: 18px;
    }

    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* Header */
    .header {
      padding: 10px 14px 9px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .header-title { font-size: 14px; font-weight: 700; color: #fff; }
    .header-date  { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .header-stats { font-size: 11px; color: var(--muted); white-space: nowrap; }
    .header-stats .num { color: var(--green); font-weight: 600; }

    /* Tabs */
    .tabs { display: flex; gap: 3px; align-items: center; }
    .tab {
      font-size: 11px; font-weight: 600; padding: 4px 9px; border-radius: 6px;
      cursor: pointer; color: var(--muted); border: 1px solid transparent;
      transition: color 0.1s, background 0.1s; user-select: none;
    }
    .tab:hover { color: var(--text); background: var(--surface2); }
    .tab.today.active   { color: var(--amber);  border-color: rgba(251,191,36,0.3);  background: rgba(251,191,36,0.08); }
    .tab.yest.active    { color: var(--muted);  border-color: rgba(107,107,128,0.35); background: rgba(107,107,128,0.08); }
    .tab.tmrw.active    { color: var(--blue);   border-color: rgba(96,165,250,0.3);  background: rgba(96,165,250,0.08); }
    .tab.week.active     { color: var(--green);  border-color: rgba(16,185,129,0.3);  background: rgba(16,185,129,0.08);  }
    .tab.nweek.active    { color: var(--orange); border-color: rgba(251,146,60,0.3);  background: rgba(251,146,60,0.08);  }
    .tab.someday.active  { color: var(--purple); border-color: rgba(167,139,250,0.3); background: rgba(167,139,250,0.08); }
    .tab.mem.active     { color: var(--cyan);   border-color: rgba(34,211,238,0.3);  background: rgba(34,211,238,0.08); }
    .tab.drop-target {
      color: var(--green) !important; border-color: rgba(16,185,129,0.5) !important;
      background: rgba(16,185,129,0.12) !important;
      animation: tab-pulse 0.8s ease-in-out infinite alternate;
    }
    @keyframes tab-pulse { from { background: rgba(16,185,129,0.08); } to { background: rgba(16,185,129,0.22); } }

    .hist-btn {
      font-size: 11px; font-weight: 700; padding: 4px 7px; border-radius: 6px;
      cursor: pointer; color: var(--muted); background: none;
      border: 1px solid var(--border); transition: color 0.1s, background 0.1s; line-height: 1;
    }
    .hist-btn:hover { color: var(--text); background: var(--surface2); }
    .hist-btn.active { color: var(--muted); border-color: rgba(107,107,128,0.4); background: rgba(107,107,128,0.1); }

    /* Banners */
    .yest-banner {
      display: none; align-items: center; gap: 6px; padding: 5px 14px;
      background: rgba(107,107,128,0.08); border-bottom: 1px solid var(--border);
      font-size: 11px; color: var(--muted); flex-shrink: 0;
    }
    .yest-banner.visible { display: flex; }
    .now-banner {
      display: none; align-items: center; gap: 10px; padding: 10px 16px;
      background: rgba(251,191,36,0.07); border-bottom: 1px solid rgba(251,191,36,0.18);
      font-size: 13px; color: var(--muted); flex-shrink: 0;
    }
    .now-banner.visible { display: flex; }
    .now-dot { color: var(--amber); font-size: 8px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;}50%{opacity:0.3;} }
    .now-label { color: var(--amber); font-weight: 700; font-size: 20px; letter-spacing: -0.02em; }

    /* Task list */
    .task-list { flex: 1; overflow-y: auto; overflow-x: hidden; }
    .task-list::-webkit-scrollbar { width: 8px; }
    .task-list::-webkit-scrollbar-track { background: transparent; }
    .task-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .task-list.drop-zone { outline: 2px dashed rgba(16,185,129,0.35); outline-offset: -4px; }

    /* Done divider */
    .done-divider {
      display: flex; align-items: center; gap: 8px; height: 30px; padding: 0 14px;
      font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px;
    }
    .done-divider::after { content:''; flex:1; height:1px; background: var(--border); }

    /* Task row */
    .task-row {
      display: flex; flex-direction: column; height: var(--row-h);
      overflow: hidden; border-left: 2px solid transparent;
      transition: background 0.1s, border-color 0.1s;
    }
    .task-row:hover   { background: var(--surface2); }
    .task-row.focused { background: rgba(251,191,36,0.05); border-left-color: var(--amber); }
    .task-row.done    { height: auto; }
    .task-row.notes-open { height: auto; }
    .task-row.dragging   { opacity: 0.25; }
    .task-row.selected   { background: rgba(251,191,36,0.07); border-left-color: var(--amber); }
    .task-row.drag-over-top    { border-top: 2px solid var(--amber); }
    .task-row.drag-over-bottom { border-bottom: 2px solid var(--amber); }
    .task-row.note-drop-target { background: rgba(96,165,250,0.1); outline: 1px solid rgba(96,165,250,0.5); border-radius: 6px; }

    /* Task main */
    .task-main {
      display: flex; align-items: center; gap: 10px;
      height: var(--row-h); flex-shrink: 0; padding: 0 10px 0 4px;
    }
    .task-row.done .task-main { height: auto; padding: 1px 10px 1px 4px; }

    /* Drag handle */
    .drag-handle {
      color: var(--border); cursor: grab; font-size: 13px;
      flex-shrink: 0; opacity: 0; transition: opacity 0.1s; line-height: 1;
    }
    .task-row:hover .drag-handle { opacity: 1; }
    .drag-handle:hover { color: var(--muted); }

    /* Priority star */
    .task-priority-star {
      color: var(--muted); cursor: pointer; font-size: 13px;
      flex-shrink: 0; opacity: 0; transition: opacity 0.1s, color 0.1s; line-height: 1;
      padding: 0 1px;
    }
    .task-row:hover .task-priority-star { opacity: 0.35; }
    .task-row.priority .task-priority-star { opacity: 1 !important; color: var(--amber); }
    .task-row.priority { border-left-color: var(--amber); }

    /* Checkbox */
    .task-check {
      width: var(--check-size); height: var(--check-size); min-width: var(--check-size);
      border: 2px solid var(--border); border-radius: 50%; flex-shrink: 0; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: border-color 0.15s;
    }
    .task-check:hover { border-color: var(--green); }
    .task-row.done .task-check { border-color: var(--green); background: rgba(16,185,129,0.15); }
    .check-mark { color: var(--green); font-size: calc(var(--check-size)*0.55); display: none; line-height:1; }
    .task-row.done .check-mark { display: block; }

    /* Task body */
    .task-body { flex:1; display:flex; align-items:center; gap:12px; min-width:0; overflow:hidden; }
    .task-text {
      font-size: var(--task-font); font-weight: 600; color: var(--text);
      flex:1; white-space: nowrap; overflow: hidden; line-height: 1.15; letter-spacing: -0.01em;
    }
    .task-row.done .task-text { text-decoration: line-through; }
    .task-time {
      font-size: var(--time-font); color: var(--text); flex-shrink: 0;
      font-variant-numeric: tabular-nums; cursor: pointer;
      padding: 2px 6px; border-radius: 5px; transition: background 0.1s; white-space: nowrap;
    }
    .task-time:hover { background: var(--border); }
    .task-time-add {
      font-size: var(--time-font); color: var(--border); flex-shrink: 0;
      cursor: pointer; opacity: 0; padding: 2px 6px; border-radius: 5px;
      white-space: nowrap; transition: opacity 0.1s, color 0.1s;
    }
    .task-row:hover .task-time-add { opacity: 1; }
    .task-time-add:hover { color: var(--muted); }

    /* Inline edit */
    .task-text-input {
      flex:1; background: var(--surface2); border: 1px solid var(--amber); border-radius: 5px;
      padding: 3px 8px; color: var(--text); font-size: var(--task-font);
      font-weight: 600; outline: none; min-width: 0;
    }
    .task-time-input {
      width: calc(var(--time-font)*5.5); min-width: 52px;
      background: var(--surface2); border: 1px solid var(--amber); border-radius: 4px;
      padding: 2px 5px; color: var(--text); font-size: var(--time-font);
      outline: none; text-align: center; flex-shrink: 0;
    }

    /* Action buttons */
    .task-actions { display:flex; align-items:center; gap:2px; flex-shrink:0; }
    .action-btn {
      width: 22px; height: 22px; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 10px; color: var(--muted);
      transition: color 0.1s, background 0.1s; flex-shrink: 0;
      opacity: 0;
    }
    .task-row:hover .action-btn  { opacity: 1; }
    .task-row.focused .action-btn { opacity: 1; }
    .action-btn:hover { background: var(--border); }
    .action-btn.notes-btn { font-size: 11px; font-weight: 700; letter-spacing: -0.5px; }
    .action-btn.notes-btn.has-notes { opacity: 0.75; color: var(--amber); }
    .action-btn.notes-btn.has-notes:hover { opacity: 1; }
    .action-btn.notes-btn.has-notes { color: var(--amber); opacity: 1 !important; }
    .action-btn.notes-btn:hover { color: var(--amber); }
    .notes-star {
      color: var(--amber); font-size: calc(var(--task-font)*0.65);
      font-weight: 900; flex-shrink: 0; line-height: 1; align-self: flex-start; margin-top: 1px;
    }
    .action-btn.focus-btn { font-size: 11px; font-weight: 700; }
    .action-btn.focus-btn:hover { color: var(--amber); }
    .task-row.focused .action-btn.focus-btn { color: var(--amber); }
    .action-btn.del-btn:hover { color: #ef4444; }

    /* Notes */
    .task-notes-section { display: none; padding: 2px 14px 10px 42px; }
    .task-row.notes-open .task-notes-section { display: block; }
    .task-note-item { display:flex; align-items:center; gap:8px; padding:3px 0; }
    .note-check {
      width: 13px; height: 13px; min-width: 13px; border: 1.5px solid var(--border);
      border-radius: 50%; cursor: pointer; display:flex; align-items:center;
      justify-content:center; flex-shrink:0; transition: border-color 0.15s;
    }
    .note-check:hover { border-color: var(--green); }
    .note-check.done { border-color: var(--green); background: rgba(16,185,129,0.15); }
    .note-check-mark { color: var(--green); font-size: 8px; display:none; line-height:1; }
    .note-check.done .note-check-mark { display:block; }
    .note-text { flex:1; font-size: max(11px, calc(var(--task-font)*0.6)); color: var(--muted); line-height: 1.4; cursor: text; }
    .note-text.done { text-decoration: line-through; opacity: 0.5; cursor: default; }
    .note-text[contenteditable="true"] { outline: none; color: var(--text); }
    .note-del { color: var(--border); cursor: pointer; font-size: 9px; opacity: 0; transition: opacity 0.1s; padding: 2px 4px; flex-shrink: 0; }
    .task-note-item:hover .note-del { opacity: 1; }
    .note-del:hover { color: #ef4444; }
    .note-add-row { display:flex; align-items:center; gap:8px; padding:4px 0 2px; }
    .note-add-placeholder { width:13px; height:13px; flex-shrink:0; }
    .note-input {
      flex:1; background: transparent; border: none; border-bottom: 1px solid var(--border);
      color: var(--text); font-size: max(11px, calc(var(--task-font)*0.6));
      outline: none; padding: 2px 0; transition: border-color 0.15s;
    }
    .note-input::placeholder { color: var(--border); }
    .note-input:focus { border-bottom-color: var(--amber); }

    /* Footer */
    .footer { border-top: 1px solid var(--border); flex-shrink: 0; }
    .add-row { display:flex; gap:6px; padding:8px 10px; }
    .add-input {
      flex:1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 7px; padding: 7px 11px; color: var(--text);
      font-size: 13px; outline: none; transition: border-color 0.15s; min-width: 0;
    }
    .add-input::placeholder { color: var(--muted); }
    .add-input:focus { border-color: var(--amber); }
    .add-btn {
      background: rgba(251,191,36,0.12); color: var(--amber);
      border: 1px solid rgba(251,191,36,0.25); border-radius: 7px;
      padding: 7px 12px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background 0.1s; white-space: nowrap; flex-shrink: 0;
    }
    .add-btn:hover { background: rgba(251,191,36,0.22); }
    .clear-row { padding: 0 10px 6px; display: none; }
    .clear-row.visible { display: block; }
    .clear-btn { background: none; border: none; color: var(--muted); font-size: 11px; cursor: pointer; padding: 2px 0; }
    .clear-btn:hover { color: #ef4444; }
    .push-row { display: none; align-items: center; gap: 5px; padding: 0 10px 7px; }
    .push-row.visible { display: flex; }
    .push-label { font-size: 11px; color: var(--muted); margin-right: 2px; }
    .push-btn {
      font-size: 11px; font-weight: 600; padding: 3px 9px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--muted); cursor: pointer;
    }
    .push-btn:hover { color: var(--text); border-color: var(--muted); }

    /* Habits */
    .habit-toggle-row { padding: 0 10px 4px; }
    .habit-toggle-btn { background: none; border: none; color: var(--muted); font-size: 11px; cursor: pointer; padding: 2px 0; }
    .habit-toggle-btn:hover { color: var(--text); }
    .habit-strip { display: none; padding: 0 10px 8px; }
    .habit-strip.visible { display: block; }
    .habit-row { display: flex; align-items: center; gap: 5px; padding: 3px 0; flex-wrap: wrap; }
    .habit-row-label { font-size: 10px; color: var(--muted); min-width: 52px; flex-shrink: 0; text-align: right; padding-right: 4px; }
    .habit-pill { font-size: 11px; font-weight: 600; padding: 2px 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; color: var(--muted); cursor: pointer; }
    .habit-pill:hover { color: var(--text); border-color: var(--muted); }
    .habit-pill.added { opacity: 0.3; cursor: default; }
    .habit-count-btn { font-size: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--muted); cursor: pointer; padding: 1px 6px; line-height: 1.4; }
    .habit-count-btn:hover { color: var(--text); }
    .habit-count-val { font-size: 11px; font-weight: 700; color: var(--text); min-width: 18px; text-align: center; }
    .habit-add-btn { font-size: 11px; font-weight: 600; padding: 2px 9px; background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; color: var(--muted); cursor: pointer; margin-left: 2px; }
    .habit-add-btn:hover { color: var(--text); border-color: var(--muted); }

    .empty { padding: 32px 16px; text-align: center; color: var(--muted); font-size: 13px; }

    /* Someday categories */
    .someday-cat-header {
      padding: 14px 14px 4px; font-size: 10px; font-weight: 700;
      letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted);
      display: flex; align-items: center; gap: 8px;
    }
    .someday-cat-header:first-child { padding-top: 8px; }
    .someday-cat-header::after { content:''; flex:1; height:1px; background: var(--border); }
    .someday-row { --row-h: 34px; --task-font: 13px; --time-font: 10px; --check-size: 14px; }
    .cat-preview {
      font-size: 11px; color: var(--purple); white-space: nowrap;
      flex-shrink: 0; align-self: center; opacity: 0.85;
    }
    .dup-badge {
      font-size: 9px; font-weight: 700; color: var(--amber);
      opacity: 0.7; flex-shrink: 0; cursor: default; line-height: 1;
      background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.3);
      border-radius: 3px; padding: 1px 4px; letter-spacing: 0.03em;
    }

    /* Search */
    .search-btn {
      background: none; border: 1px solid var(--border); border-radius: 6px;
      color: var(--muted); cursor: pointer; padding: 4px 8px; font-size: 14px;
      transition: color 0.1s, background 0.1s; line-height: 1; flex-shrink: 0;
    }
    .search-btn:hover { color: var(--text); background: var(--surface2); }
    .search-btn.active { color: var(--amber); border-color: rgba(251,191,36,0.3); background: rgba(251,191,36,0.08); }
    .search-bar {
      display: none; align-items: center; gap: 8px; padding: 8px 14px;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .search-bar.visible { display: flex; }
    .search-bar-input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 7px; padding: 6px 11px; color: var(--text);
      font-size: 13px; outline: none; transition: border-color 0.15s;
    }
    .search-bar-input:focus { border-color: var(--amber); }
    .search-bar-input::placeholder { color: var(--muted); }
    .search-close-btn {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 12px; padding: 4px 7px; border-radius: 4px; transition: color 0.1s;
    }
    .search-close-btn:hover { color: var(--text); }
    .search-result-row {
      display: flex; align-items: center; gap: 10px; height: 46px;
      padding: 0 12px 0 4px; border-left: 2px solid transparent;
      transition: background 0.1s; cursor: pointer; flex-shrink: 0;
    }
    .search-result-row:hover { background: var(--surface2); border-left-color: var(--amber); }
    .search-result-row.dragging { opacity: 0.25; }
    .result-text {
      flex: 1; font-size: 14px; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .result-text mark { background: rgba(251,191,36,0.25); color: var(--amber); border-radius: 2px; padding: 0 1px; font-style: normal; }
    .result-note-snippet {
      font-size: 11px; color: var(--muted); white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; max-width: 160px;
    }
    .result-tab-badge {
      font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 4px;
      flex-shrink: 0; white-space: nowrap; border: 1px solid; opacity: 0.9;
    }
    .search-empty { padding: 32px 16px; text-align: center; color: var(--muted); font-size: 13px; }

    /* Working Memory */
    .wmem-area {
      display: none; flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 16px 18px; outline: none;
      font-size: 14px; line-height: 1.65; color: var(--text);
    }
    .wmem-area:empty::before {
      content: 'Working memory — dump anything here.\A\AThoughts, screenshots, links, rough notes. This carries forward every day.';
      white-space: pre; color: var(--muted); pointer-events: none; display: block;
    }
    .wmem-area img {
      max-width: 100%; border-radius: 6px; margin: 6px 0;
      display: block; border: 1px solid var(--border);
      cursor: pointer;
    }
    .img-resize-overlay {
      position: fixed; pointer-events: none;
      border: 2px solid var(--blue); border-radius: 4px; z-index: 999;
    }
    .img-resize-handle {
      position: absolute; right: -6px; bottom: -6px;
      width: 13px; height: 13px; background: var(--blue);
      border-radius: 3px; cursor: se-resize; pointer-events: all;
    }
    .wmem-area::-webkit-scrollbar { width: 8px; }
    .wmem-area::-webkit-scrollbar-track { background: transparent; }
    .wmem-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Working Memory search bar */
    .wmem-search-bar {
      display: none; align-items: center; gap: 6px;
      padding: 7px 14px 6px; border-bottom: 1px solid var(--border);
      flex-shrink: 0; background: var(--surface);
    }
    .wmem-search-bar.visible { display: flex; }
    .wmem-search-input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 12px;
      padding: 5px 10px; outline: none;
    }
    .wmem-search-input:focus { border-color: var(--amber); }
    .wmem-search-input::placeholder { color: var(--muted); }
    .wmem-search-count { font-size: 11px; color: var(--muted); white-space: nowrap; min-width: 38px; text-align: right; }
    .wmem-search-nav {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); border-radius: 5px; cursor: pointer;
      font-size: 12px; padding: 3px 7px;
    }
    .wmem-search-nav:hover { color: var(--text); }
    .wmem-search-close-btn {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 13px; padding: 2px 4px;
    }
    .wmem-search-close-btn:hover { color: var(--text); }
    .wmem-hl { background: rgba(251,191,36,0.3); border-radius: 2px; }
    .wmem-hl.current { background: rgba(251,191,36,0.65); }

    /* Working Memory page tabs */
    .wmem-tabs-bar {
      display: none; align-items: center; gap: 4px;
      padding: 6px 14px 5px; border-bottom: 1px solid var(--border);
      overflow-x: auto; flex-shrink: 0; background: var(--surface);
    }
    .wmem-tabs-bar.visible { display: flex; }

<script>
// ── Keys ───────────────────────────────────────────────────────
function localDateStr(d = new Date()) {
  return d.getFullYear() + '-'
    + String(d.getMonth() + 1).padStart(2, '0') + '-'
    + String(d.getDate()).padStart(2, '0');
}
const TODAY_DATE  = localDateStr();
const TODAY_KEY   = 'today-v1-' + TODAY_DATE;
const YEST_KEY    = 'today-v1-' + (() => { const d = new Date(); d.setDate(d.getDate()-1); return localDateStr(d); })();
const TMRW_KEY        = 'tmrw-v1';
const TMRW_ROLLED_KEY = 'tmrw-rolled-v1';
const YEST_ROLLED_KEY = 'yest-rolled-v1';
const WEEK_KEY    = 'week-v1';
const NWEEK_KEY   = 'nweek-v1';
const SOMEDAY_KEY = 'someday-v1';
const WMEM_KEY       = 'wmem-v1';
const WMEM_PAGES_KEY = 'wmem-pages-v1';

// ── State ──────────────────────────────────────────────────────
let viewMode = 'today';
let histDate = null;
let tasks    = loadKey(TODAY_KEY);

// ── Storage ────────────────────────────────────────────────────
function loadKey(key) {
  try { return JSON.parse(localStorage.getItem(key) || '[]').map(t => ({ notes:[], expanded:false, priority:false, ...t })); }
  catch { return []; }
}
function saveKey(key, arr) { localStorage.setItem(key, JSON.stringify(arr)); }
function save() { saveKey(TODAY_KEY, tasks); }

function tabKey(tab) {
  if (tab === 'today')     return TODAY_KEY;
  if (tab === 'yesterday') return YEST_KEY;
  if (tab === 'tomorrow')  return TMRW_KEY;
  if (tab === 'week')      return WEEK_KEY;
  if (tab === 'nextweek')  return NWEEK_KEY;
  if (tab === 'someday')   return SOMEDAY_KEY;
  if (tab === 'history')   return histDate ? 'today-v1-' + histDate : null;
  return null;
}

function currentKey() { return tabKey(viewMode); }

// ── Generic mutations ──────────────────────────────────────────
function getArr(key) { return key === TODAY_KEY ? tasks : loadKey(key); }
function putArr(key, arr) { if (key === TODAY_KEY) { tasks = arr; save(); } else saveKey(key, arr); }

function toggleDoneIn(id, key) {
  const arr = getArr(key);
  const t = arr.find(t => t.id === id);
  if (!t) return;
  t.done = !t.done;
  if (t.done) { t.focus = false; t.expanded = false; t.completedAt = Date.now(); }
  else { delete t.completedAt; }
  putArr(key, arr); reRender();
}
function toggleFocusIn(id, key) {
  const arr = getArr(key);
  const already = arr.find(t => t.id === id)?.focus;
  arr.forEach(t => { t.focus = false; });
  if (!already) { const t = arr.find(t => t.id === id); if (t && !t.done) t.focus = true; }
  putArr(key, arr); reRender();
}
function togglePriorityIn(id, key) {
  const arr = getArr(key);
  const t = arr.find(t => t.id === id);
  if (t && !t.done) t.priority = !t.priority;
  putArr(key, arr); reRender();
}
function toggleExpandedIn(id, key) {
  const arr = getArr(key);
  const t = arr.find(t => t.id === id);
  if (!t) return;
  t.expanded = !t.expanded;
  putArr(key, arr); reRender();
}
function deleteTaskFrom(id, key) {
  putArr(key, getArr(key).filter(t => t.id !== id)); reRender();
}
let _uidCounter = 0;
function uid() {
  // Guaranteed-unique id even when called many times in the same millisecond
  return Date.now().toString(36) + '-' + (_uidCounter++).toString(36) + '-' + Math.random().toString(36).slice(2, 6);
}
function updateTaskIn(id, text, time, key) {
  const arr = getArr(key);
  const t = arr.find(t => t.id === id);
  if (t) { t.text = text; t.time = time; t.timeMins = parseTime(time); }
  putArr(key, arr);
}
function addNoteIn(taskId, text, key) {
  if (!text.trim()) return;
  const arr = getArr(key);
  const t = arr.find(t => t.id === taskId);
  if (!t) return;
  t.notes.push({ id: uid(), text: text.trim() });
  t.expanded = true;
  putArr(key, arr); reRender();
}
function deleteNoteIn(taskId, noteId, key) {
  const arr = getArr(key);
  const t = arr.find(t => t.id === taskId);
  if (t) t.notes = t.notes.filter(n => n.id !== noteId);
  putArr(key, arr); reRender();
}
function editNoteIn(taskId, noteId, key, el) {
  const orig = el.textContent;
  el.contentEditable = 'true';
  el.focus();
  const range = document.createRange();
  range.selectNodeContents(el);
  range.collapse(false);
  window.getSelection().removeAllRanges();
  window.getSelection().addRange(range);
  const commit = () => {
    el.contentEditable = 'false';
    const val = el.textContent.trim();
    if (!val) { deleteNoteIn(taskId, noteId, key); return; }
    if (val === orig) return;
    const arr = getArr(key);
    const t = arr.find(t => t.id === taskId);
    const n = t?.notes.find(n => n.id === noteId);
    if (n) { n.text = val; putArr(key, arr); reRender(); }
  };
  el.addEventListener('blur', commit, { once: true });
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
    if (e.key === 'Escape') { el.textContent = orig; el.blur(); }
  }, { once: true });
}
function toggleNoteIn(taskId, noteId, key) {
  const arr = getArr(key);
  const t = arr.find(t => t.id === taskId);
  if (!t) return;
  const n = t.notes.find(n => n.id === noteId);
  if (!n) return;
  n.done = !n.done;
  // If all notes are now checked, mark the parent task done too
  if (t.notes.length > 0 && t.notes.every(n => n.done)) {
    t.done = true;
    t.focus = false;
    t.expanded = false;
    t.completedAt = Date.now();
  }
  putArr(key, arr);
  if (key === TODAY_KEY) tasks = arr;
  reRender();
}
function addTaskTo(raw, key) {
  if (!raw.trim()) return;
  const { text, time } = parseInput(raw);
  const arr = getArr(key);
  const task = { id: uid(), text, time, timeMins: parseTime(time), done:false, focus:false, priority:false, notes:[], expanded:false };
  if (key === SOMEDAY_KEY) task.category = detectCategory(text);
  arr.push(task);
  putArr(key, arr); reRender();
}
function clearDoneIn(key) {
  putArr(key, getArr(key).filter(t => !t.done)); reRender();
}

// ── Parse ──────────────────────────────────────────────────────
function parseInput(raw) {
  const s = raw.trim();
  const m = s.match(/^(.+?)\s*[-–—]\s*(\S.*?)$/);
  if (m && (/\d/.test(m[2]) || /^noon/i.test(m[2]))) return { text: m[1].trim(), time: m[2].trim() };
  return { text: s, time: '' };
}
function parseTime(str) {
  if (!str) return Infinity;
  const s = str.trim().toLowerCase();
  // "noon", "noon30", "noon45", "noon:30" etc.
  const noonMatch = s.match(/^noon:?\s*(\d{1,2})?$/);
  if (noonMatch) return 12 * 60 + (noonMatch[1] ? parseInt(noonMatch[1]) : 0);
  const ampm = s.match(/(am|pm)$/);
  const isPM = ampm ? ampm[1] === 'pm' : null;
  const p = s.match(/^(\d{1,2})(?::(\d{2}))?/);
  if (!p) return Infinity;
  let h = parseInt(p[1]);
  const min = p[2] ? parseInt(p[2]) : 0;
  if (isPM !== null) {
    if (isPM && h !== 12) h += 12;
    if (!isPM && h === 12) h = 0;
  } else {
    // No AM/PM specified — pick the next upcoming occurrence relative to now
    const nowMins = new Date().getHours() * 60 + new Date().getMinutes();
    const asMins  = h * 60 + min;         // as-is (e.g. h=7 → 7:00)
    const asPM    = (h % 12 + 12) * 60 + min; // PM version (e.g. 7 → 19:00)
    const asAM    = (h % 12) * 60 + min;       // AM version (e.g. 7 → 7:00)
    if (h === 0 || h === 12) {
      // 12 → noon, 0 → midnight — unambiguous
    } else if (h >= 1 && h <= 11) {
      // AM is always sooner than PM — use AM if it's still upcoming, else PM
      if (asAM >= nowMins) { /* AM is next, keep h */ }
      else if (asPM >= nowMins) h = h + 12;  // AM passed, PM still upcoming
      else h = h + 12;                        // both past, default PM
    }
    // h >= 13 is already unambiguous 24h
  }
  return h * 60 + min;
}

// ── Tab switching ──────────────────────────────────────────────
const TAB_MAP = { today:'tab-today', yesterday:'tab-yest', tomorrow:'tab-tmrw', week:'tab-week', nextweek:'tab-nweek', someday:'tab-someday', memory:'tab-mem' };
const TAB_TITLES = { today:'Today', yesterday:'Yesterday', tomorrow:'Tomorrow', week:'This Week', nextweek:'Next Week', someday:'Someday', memory:'Working Memory', history:'History' };
const ADD_PLACEHOLDERS = { today:'task  (or: task — 6pm)', tomorrow:'add to tomorrow…', week:'add to this week…', nextweek:'add to next week…', someday:'add to someday…' };

function switchTab(tab, dateStr) {
  const prevMode = viewMode;
  if (prevMode === 'memory' && tab !== 'memory') closeWmemSearch();
  viewMode = (tab === 'history') ? 'history' : tab;
  if (tab === 'history' && dateStr) histDate = dateStr;

  Object.entries(TAB_MAP).forEach(([t, id]) => {
    const el = document.getElementById(id);
    el.classList.remove('active');
    if (t === tab || (tab === 'history' && t === 'yesterday')) el.classList.add('active');
  });
  document.getElementById('hist-btn').classList.toggle('active', tab === 'history');

  const isReadonly = tab === 'yesterday' || tab === 'history';
  const isMemory   = tab === 'memory';

  document.getElementById('yest-banner').classList.toggle('visible', isReadonly);
  document.getElementById('now-banner').style.display  = tab === 'today' ? '' : 'none';
  document.getElementById('footer').style.display      = (isReadonly || isMemory) ? 'none' : '';
  document.getElementById('header-stats').style.visibility = isMemory ? 'hidden' : '';
  document.getElementById('header-title').textContent  = TAB_TITLES[tab] || 'Today';
  document.title = 'Checklist — ' + (TAB_TITLES[tab] || 'Today');
  document.getElementById('task-list').style.display      = isMemory ? 'none' : '';
  document.getElementById('wmem-tabs-bar').classList.toggle('visible', isMemory);
  document.getElementById('wmem-area').style.display      = isMemory ? 'block' : 'none';
  if (ADD_PLACEHOLDERS[tab]) document.getElementById('add-input').placeholder = ADD_PLACEHOLDERS[tab];

  if (isReadonly) {
    const key = tab === 'history' ? ('today-v1-' + histDate) : YEST_KEY;
    const d   = tab === 'history'
      ? new Date(histDate + 'T12:00:00')
      : (() => { const x = new Date(); x.setDate(x.getDate()-1); return x; })();
    document.getElementById('yest-date-str').textContent =
      d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
    renderView(loadKey(key), tab === 'history' ? 'history' : 'yesterday');
  } else if (tab === 'today') {
    tasks = loadKey(TODAY_KEY); render();
  } else if (tab === 'tomorrow') {
    renderList(TMRW_KEY, 'tomorrow');
  } else if (tab === 'week') {
    renderList(WEEK_KEY, 'week');
  } else if (tab === 'nextweek') {
    renderList(NWEEK_KEY, 'nextweek');
  } else if (tab === 'someday') {
    renderSomeday();
  } else if (tab === 'memory') {
    _deselImg(); clearSelection();
    loadWmem();
    document.getElementById('wmem-search-bar').classList.remove('visible');
    setTimeout(() => document.getElementById('wmem-area').focus(), 50);
  } else {
    if (prevMode === 'memory') {
      clearTimeout(wmemTimer);
      _saveCurrentPageContent();
    }
    _deselImg(); clearSelection();
  }
}

function reRender() {
  if (searchOpen) { renderSearchResults(runSearch(document.getElementById('search-input').value)); return; }
  if (viewMode === 'today')     render();
  else if (viewMode === 'tomorrow')  renderList(TMRW_KEY, 'tomorrow');
  else if (viewMode === 'week')      renderList(WEEK_KEY, 'week');
  else if (viewMode === 'nextweek')  renderList(NWEEK_KEY, 'nextweek');
  else if (viewMode === 'someday')   renderSomeday();
  else if (viewMode === 'yesterday') renderView(loadKey(YEST_KEY), 'yesterday');
  else if (viewMode === 'history' && histDate) renderView(loadKey('today-v1-'+histDate), 'history');
}

// ── Working Memory ─────────────────────────────────────────────
const wmemEl = document.getElementById('wmem-area');
let wmemTimer;
let wmemPages = [];
let wmemActivePageId = null;
let _wmemPageDrag = null;
let _wmemArchiveOpen = false;

function _escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function _loadPagesData() {
  const raw = localStorage.getItem(WMEM_PAGES_KEY);
  if (raw) return JSON.parse(raw);
  // First run: migrate legacy wmem-v1 content into first page
  const legacy = localStorage.getItem(WMEM_KEY) || '';
  const pages = [{ id: uid(), title: 'Notes', createdAt: new Date().toISOString(), content: legacy, archived: false }];
  localStorage.setItem(WMEM_PAGES_KEY, JSON.stringify(pages));
  return pages;
}

function _savePagesData() {
  localStorage.setItem(WMEM_PAGES_KEY, JSON.stringify(wmemPages));
}

function _saveCurrentPageContent() {
  if (!wmemActivePageId || _wmemArchiveOpen) return;
  const page = wmemPages.find(p => p.id === wmemActivePageId);
  if (page) page.content = _wmemSearchSaved !== null ? _wmemSearchSaved : wmemEl.innerHTML;
  _savePagesData();
}

function loadWmem() {
  wmemPages = _loadPagesData();
  _wmemArchiveOpen = false;
  const available = wmemPages.filter(p => !p.archived);
  if (!wmemActivePageId || !available.find(p => p.id === wmemActivePageId)) {
    wmemActivePageId = available.length ? available[0].id : null;
  }
  const page = wmemPages.find(p => p.id === wmemActivePageId);
  wmemEl.innerHTML = page ? page.content : '';
  wmemEl.querySelectorAll('img').forEach(makeResizable);
  wmemEl.setAttribute('contenteditable', 'true');
  renderWmemTabs();
}

function saveWmem() {
  clearTimeout(wmemTimer);
  wmemTimer = setTimeout(() => {
    _saveCurrentPageContent();
  }, 600);
}

function renderWmemTabs() {
  const bar = document.getElementById('wmem-tabs-bar');
  bar.innerHTML = '';
  const active = wmemPages.filter(p => !p.archived);

  active.forEach(page => {
    const pill = document.createElement('div');
    pill.className = 'wmem-page-tab' + (!_wmemArchiveOpen && page.id === wmemActivePageId ? ' active' : '');
    pill.dataset.id = page.id;
    pill.draggable = true;
    const d = new Date(page.createdAt).toLocaleDateString('en-US', { month:'short', day:'numeric' });
    pill.innerHTML = `<span class="wmem-page-title">${_escHtml(page.title)}</span><span class="wmem-page-date">${d}</span>`;

    pill.addEventListener('click', () => {
      if (_wmemArchiveOpen || page.id !== wmemActivePageId) _switchToPage(page.id);
    });
    pill.addEventListener('dblclick', e => {
      e.stopPropagation();
      _editPageTitle(pill.querySelector('.wmem-page-title'), page);
    });
    pill.addEventListener('dragstart', e => {
      _wmemPageDrag = page.id;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => pill.style.opacity = '0.45', 0);
    });
    pill.addEventListener('dragend', () => {
      _wmemPageDrag = null;
      pill.style.opacity = '';
      const ab = document.getElementById('wmem-archive-drop');
      if (ab) ab.classList.remove('drop-target');
    });
    bar.appendChild(pill);
  });

  const newBtn = document.createElement('button');
  newBtn.className = 'wmem-new-btn';
  newBtn.textContent = '+ New';
  newBtn.addEventListener('click', _newWmemPage);
  bar.appendChild(newBtn);

  const spacer = document.createElement('div');
  spacer.style.flex = '1';
  bar.appendChild(spacer);

  const archCount = wmemPages.filter(p => p.archived).length;
  const archBtn = document.createElement('button');
  archBtn.id = 'wmem-archive-drop';
  archBtn.className = 'wmem-archive-btn' + (_wmemArchiveOpen ? ' active' : '');
  archBtn.textContent = 'Archive' + (archCount ? ` (${archCount})` : '');
  archBtn.addEventListener('click', () => _wmemArchiveOpen ? _closeArchiveView() : _openArchiveView());
  archBtn.addEventListener('dragover', e => { if (_wmemPageDrag) { e.preventDefault(); archBtn.classList.add('drop-target'); } });
  archBtn.addEventListener('dragleave', () => archBtn.classList.remove('drop-target'));
  archBtn.addEventListener('drop', e => { e.preventDefault(); archBtn.classList.remove('drop-target'); if (_wmemPageDrag) _archivePage(_wmemPageDrag); });
  bar.appendChild(archBtn);
}

function _switchToPage(id) {
  _saveCurrentPageContent();
  closeWmemSearch();
  _wmemArchiveOpen = false;
  wmemActivePageId = id;
  const page = wmemPages.find(p => p.id === id);
  wmemEl.innerHTML = page ? page.content : '';
  wmemEl.querySelectorAll('img').forEach(makeResizable);
  wmemEl.setAttribute('contenteditable', 'true');
  renderWmemTabs();
  setTimeout(() => wmemEl.focus(), 30);
}

function _newWmemPage() {
  _saveCurrentPageContent();
  const page = { id: uid(), title: 'New page', createdAt: new Date().toISOString(), content: '', archived: false };
  wmemPages.push(page);
  _savePagesData();
  _switchToPage(page.id);
  setTimeout(() => {
    const titleEl = document.querySelector(`.wmem-page-tab[data-id="${page.id}"] .wmem-page-title`);
    if (titleEl) _editPageTitle(titleEl, page);
  }, 60);
}

function _archivePage(id) {
  const page = wmemPages.find(p => p.id === id);
  if (!page) return;
  if (id === wmemActivePageId) _saveCurrentPageContent();
  page.archived = true;
  _savePagesData();
  if (id === wmemActivePageId) {
    const next = wmemPages.find(p => !p.archived);
    if (next) { _switchToPage(next.id); } else { _newWmemPage(); }
    return;
  }
  renderWmemTabs();
}

function _openArchiveView() {
  _saveCurrentPageContent();
  closeWmemSearch();
  _wmemArchiveOpen = true;
  wmemEl.setAttribute('contenteditable', 'false');
  _renderArchiveContent();
  renderWmemTabs();
}

function _closeArchiveView() {
  _wmemArchiveOpen = false;
  wmemEl.setAttribute('contenteditable', 'true');
  const page = wmemPages.find(p => p.id === wmemActivePageId);
  wmemEl.innerHTML = page ? page.content : '';
  wmemEl.querySelectorAll('img').forEach(makeResizable);
  renderWmemTabs();
}

function _renderArchiveContent() {
  wmemEl.innerHTML = '';
  const archived = wmemPages.filter(p => p.archived);
  if (!archived.length) {
    const empty = document.createElement('p');
    empty.style.cssText = 'color:var(--muted);padding:16px 0;font-size:13px;';
    empty.textContent = 'Archive is empty.';
    wmemEl.appendChild(empty);
    return;
  }
  archived.forEach(page => {
    const row = document.createElement('div');
    row.className = 'wmem-archive-row';
    const d = new Date(page.createdAt).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
    const info = document.createElement('div');
    info.className = 'wmem-archive-row-info';
    info.innerHTML = `<div class="wmem-archive-row-title">${_escHtml(page.title)}</div><div class="wmem-archive-row-date">Created ${d}</div>`;
    const restoreBtn = document.createElement('button');
    restoreBtn.className = 'wmem-restore-btn';
    restoreBtn.textContent = 'Restore';
    restoreBtn.addEventListener('click', () => { page.archived = false; _savePagesData(); _switchToPage(page.id); });
    const delBtn = document.createElement('button');
    delBtn.className = 'wmem-del-btn';
    delBtn.title = 'Delete permanently';
    delBtn.textContent = '✕';
    delBtn.addEventListener('click', () => {
      if (!confirm(`Delete "${page.title}" permanently?`)) return;
      wmemPages = wmemPages.filter(p => p.id !== page.id);
      _savePagesData();
      _renderArchiveContent();
      renderWmemTabs();
    });
    row.appendChild(info);
    row.appendChild(restoreBtn);
    row.appendChild(delBtn);
    wmemEl.appendChild(row);
  });
}

function _editPageTitle(el, page) {
  const orig = page.title;
  el.contentEditable = 'true';
  el.focus();
  const range = document.createRange();
  range.selectNodeContents(el);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  const commit = () => {
    el.contentEditable = 'false';
    const val = el.textContent.trim() || orig;
    el.textContent = val;
    page.title = val;
    _savePagesData();
  };
  el.addEventListener('blur', commit, { once: true });
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
    if (e.key === 'Escape') { el.textContent = orig; el.blur(); }
  }, { once: true });
}

wmemEl.addEventListener('input', saveWmem);

wmemEl.addEventListener('paste', e => {
  const items = [...(e.clipboardData?.items || [])];
  const imgItem = items.find(i => i.type.startsWith('image/'));
  if (!imgItem) return;
  e.preventDefault();
  const reader = new FileReader();
  reader.onload = ev => {
    const img = document.createElement('img');
    img.src = ev.target.result;
    const sel = window.getSelection();
    if (sel?.rangeCount) {
      const r = sel.getRangeAt(0); r.deleteContents(); r.insertNode(img); r.collapse(false);
    } else { wmemEl.appendChild(img); }
    makeResizable(img);
    saveWmem();
  };
  reader.readAsDataURL(imgItem.getAsFile());
});

// ── Working Memory search ──────────────────────────────────────
let _wmemSearchSaved = null;
let _wmemMatches = [];
let _wmemMatchIdx = 0;

function openWmemSearch() {
  wmemEl.setAttribute('contenteditable', 'false');
  document.getElementById('wmem-search-bar').classList.add('visible');
  const inp = document.getElementById('wmem-search-input');
  inp.value = '';
  document.getElementById('wmem-search-count').textContent = '';
  _wmemSearchSaved = null;
  _wmemMatches = [];
  _wmemMatchIdx = 0;
  inp.focus();
}

function closeWmemSearch() {
  document.getElementById('wmem-search-bar').classList.remove('visible');
  wmemEl.setAttribute('contenteditable', 'true');
  if (_wmemSearchSaved !== null) {
    wmemEl.innerHTML = _wmemSearchSaved;
    wmemEl.querySelectorAll('img').forEach(makeResizable);
    _wmemSearchSaved = null;
  }
  _wmemMatches = [];
  _wmemMatchIdx = 0;
  document.getElementById('wmem-search-count').textContent = '';
  document.getElementById('wmem-search-input').value = '';
}

function _wmemHighlight(q) {
  if (_wmemSearchSaved !== null) {
    wmemEl.innerHTML = _wmemSearchSaved;
    wmemEl.querySelectorAll('img').forEach(makeResizable);
  } else {
    _wmemSearchSaved = wmemEl.innerHTML;
  }
  _wmemMatches = [];
  _wmemMatchIdx = 0;

  const countEl = document.getElementById('wmem-search-count');
  if (!q.trim()) { countEl.textContent = ''; return; }

  const re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
  const walker = document.createTreeWalker(wmemEl, NodeFilter.SHOW_TEXT, null);
  const textNodes = [];
  let n;
  while ((n = walker.nextNode())) textNodes.push(n);

  textNodes.forEach(tn => {
    const text = tn.nodeValue;
    let parts = [], last = 0;
    re.lastIndex = 0;
    let m;
    while ((m = re.exec(text)) !== null) {
      if (m.index > last) parts.push(document.createTextNode(text.slice(last, m.index)));
      const mark = document.createElement('mark');
      mark.className = 'wmem-hl';
      mark.textContent = m[0];
      parts.push(mark);
      _wmemMatches.push(mark);
      last = m.index + m[0].length;
    }
    if (parts.length) {
      if (last < text.length) parts.push(document.createTextNode(text.slice(last)));
      const frag = document.createDocumentFragment();
      parts.forEach(p => frag.appendChild(p));
      tn.parentNode.replaceChild(frag, tn);
    }
  });

  if (_wmemMatches.length) {
    _wmemMatches[0].classList.add('current');
    _wmemMatches[0].scrollIntoView({ block: 'nearest' });
    countEl.textContent = `1/${_wmemMatches.length}`;
  } else {
    countEl.textContent = 'no results';
  }
}

function _wmemNav(dir) {
  if (!_wmemMatches.length) return;
  _wmemMatches[_wmemMatchIdx].classList.remove('current');
  _wmemMatchIdx = (_wmemMatchIdx + dir + _wmemMatches.length) % _wmemMatches.length;
  _wmemMatches[_wmemMatchIdx].classList.add('current');
  _wmemMatches[_wmemMatchIdx].scrollIntoView({ block: 'nearest' });
  document.getElementById('wmem-search-count').textContent = `${_wmemMatchIdx + 1}/${_wmemMatches.length}`;
}

document.getElementById('wmem-search-input').addEventListener('input', e => _wmemHighlight(e.target.value));
document.getElementById('wmem-search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); _wmemNav(e.shiftKey ? -1 : 1); }
  if (e.key === 'Escape') closeWmemSearch();
});
document.getElementById('wmem-search-prev').addEventListener('click', () => _wmemNav(-1));
document.getElementById('wmem-search-next').addEventListener('click', () => _wmemNav(1));
document.getElementById('wmem-search-close').addEventListener('click', closeWmemSearch);

// ── Image resize in working memory ────────────────────────────
let _selImg = null, _selOverlay = null;

function _posOverlay() {
  if (!_selImg || !_selOverlay) return;
  const r = _selImg.getBoundingClientRect();
  Object.assign(_selOverlay.style, { left:r.left+'px', top:r.top+'px', width:r.width+'px', height:r.height+'px' });
}

function _deselImg() {
  if (_selOverlay) { _selOverlay.remove(); _selOverlay = null; }
  _selImg = null;
}

function makeResizable(img) {
  img.addEventListener('click', e => {
    e.stopPropagation();
    if (_selImg === img) { _deselImg(); return; }
    _deselImg();
    _selImg = img;
    const ov = document.createElement('div');
    ov.className = 'img-resize-overlay';
    const h = document.createElement('div');
    h.className = 'img-resize-handle';
    ov.appendChild(h);
    document.body.appendChild(ov);
    _selOverlay = ov;
    _posOverlay();

    h.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      const sx = e.clientX, sw = img.offsetWidth;
      const onMove = e => {
        img.style.width  = Math.max(60, sw + e.clientX - sx) + 'px';
        img.style.height = 'auto';
        _posOverlay();
      };
      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        saveWmem();
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
}

document.addEventListener('click', e => {
  if (_selOverlay && !_selOverlay.contains(e.target) && e.target !== _selImg) _deselImg();
});
wmemEl.addEventListener('scroll', _posOverlay);

wmemEl.addEventListener('dragover', e => { if ([...e.dataTransfer.types].includes('Files')) e.preventDefault(); });
wmemEl.addEventListener('drop', e => {
  const imgs = [...(e.dataTransfer?.files || [])].filter(f => f.type.startsWith('image/'));
  if (!imgs.length) return;
  e.preventDefault();
  imgs.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = document.createElement('img'); img.src = ev.target.result;
      wmemEl.appendChild(img); makeResizable(img); saveWmem();
    };
    reader.readAsDataURL(file);
  });
});

// ── Canvas text measurement ────────────────────────────────────
function canvasWidth(text, font) {
  const c = canvasWidth._c || (canvasWidth._c = document.createElement('canvas'));
  const ctx = c.getContext('2d'); ctx.font = font;
  return ctx.measureText(text).width * 1.06;
}

// ── Font scaling ───────────────────────────────────────────────
function fitText(displayTasks) {
  const list = document.getElementById('task-list');
  const rows = list.querySelectorAll('.task-row:not(.done)');
  if (!rows.length) return;
  const hasDivider = !!list.querySelector('.done-divider');
  const doneRows   = list.querySelectorAll('.task-row.done').length;
  const availH     = list.clientHeight - (hasDivider ? 30 : 0) - doneRows * 28;
  const rowH       = Math.max(28, availH / rows.length);
  const fontFromH  = Math.max(11, Math.floor(rowH * 0.52));
  const OVERHEAD   = 140;
  const availW     = Math.max(60, list.clientWidth - OVERHEAD);
  const ff         = '-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif';
  const arr        = displayTasks || tasks;
  function allFitWidth(size) {
    const mf = `600 ${size}px ${ff}`, tf = `400 ${Math.floor(size*0.60)}px ${ff}`;
    return arr.every(t => canvasWidth(t.text, mf) + (t.time ? canvasWidth(t.time, tf) + 20 : 0) <= availW);
  }
  let lo = 11, hi = 128;
  while (lo < hi - 1) { const mid = Math.floor((lo+hi)/2); if (allFitWidth(mid)) lo=mid; else hi=mid; }
  const font = Math.min(fontFromH, lo);
  const r = document.documentElement;
  r.style.setProperty('--row-h',      rowH + 'px');
  r.style.setProperty('--task-font',  font + 'px');
  r.style.setProperty('--time-font',  Math.max(9, Math.floor(font*0.60)) + 'px');
  r.style.setProperty('--check-size', Math.max(15, Math.min(Math.floor(font*0.55), 36)) + 'px');
}

function detectCategory(text) {

// ── Duplicate detection ────────────────────────────────────────
let _dupTexts = new Set();

function _norm(s) { return s.toLowerCase().replace(/[^a-z0-9 ]/g, '').trim(); }

function similarText(a, b) {
  const na = _norm(a), nb = _norm(b);
  if (!na || !nb) return false;
  if (na === nb) return true;
  if (na.includes(nb) || nb.includes(na)) return true;
  const stop = new Set(['a','an','the','to','and','or','in','on','at','for','of','with','by','is','it','do','get','my','me','up']);
  const wa = na.split(' ').filter(w => w.length > 2 && !stop.has(w));
  const wb = new Set(nb.split(' ').filter(w => w.length > 2 && !stop.has(w)));
  return wa.filter(w => wb.has(w)).length >= 2;
}

function buildDupIndex() {
  const allItems = [];
  [TODAY_KEY, YEST_KEY, TMRW_KEY, WEEK_KEY, NWEEK_KEY, SOMEDAY_KEY].forEach(key => {
    loadKey(key).filter(t => !t.done).forEach(t => allItems.push({ text: t.text, key }));
  });
  _dupTexts = new Set();
  allItems.forEach(({ text, key }) => {
    if (allItems.some(other => other.key !== key && similarText(text, other.text)))
      _dupTexts.add(text);
  });
}
